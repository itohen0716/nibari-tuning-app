<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#795548">

  <title>調弦｜絲庵 ─ Shamisen ─</title>

  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <main class="app">
    <a class="back-link" href="./index.html">‹ ホームへ戻る</a>

    <header class="app-header">
      <img
        class="app-icon"
        src="./icon-192.png"
        alt=""
        width="72"
        height="72"
      >

      <div>
        <h1>調弦</h1>
        <p>基準音を聴いて、三味線の音を合わせます。</p>
      </div>
    </header>

    <section class="card" aria-labelledby="mode-title">
      <h2 id="mode-title">調弦を選ぶ</h2>

      <div class="tuning-mode-grid" role="group" aria-label="調弦の種類">
        <button
          type="button"
          class="tuning-mode-button active"
          data-mode="hon"
          aria-pressed="true"
        >
          <img src="./hon.png" alt="本調子の札を持つシャミ">
          <span>本調子</span>
        </button>

        <button
          type="button"
          class="tuning-mode-button"
          data-mode="niage"
          aria-pressed="false"
        >
          <img src="./niage.png" alt="二上りの札を持つシャミ">
          <span>二上り</span>
        </button>

        <button
          type="button"
          class="tuning-mode-button"
          data-mode="sansage"
          aria-pressed="false"
        >
          <img src="./sansage.png" alt="三下りの札を持つシャミ">
          <span>三下り</span>
        </button>
      </div>
    </section>

    <section class="card" aria-labelledby="setting-title">
      <h2 id="setting-title">本数設定</h2>

      <label for="hon">一の糸の本数</label>
      <select id="hon">
        <option value="1">1本</option>
        <option value="2">2本</option>
        <option value="3">3本</option>
        <option value="4">4本</option>
        <option value="5">5本</option>
        <option value="6" selected>6本</option>
        <option value="7">7本</option>
        <option value="8">8本</option>
        <option value="9">9本</option>
        <option value="10">10本</option>
        <option value="11">11本</option>
        <option value="12">12本</option>
      </select>

      <div class="info" id="tuningInfo" aria-live="polite"></div>
    </section>

    <section class="card" aria-labelledby="sound-title">
      <h2 id="sound-title">基準音</h2>

      <div class="button-grid">
        <button type="button" data-note="ichi">
          <span>一の糸</span>
          <small id="ichiFrequency"></small>
        </button>

        <button type="button" data-note="ni">
          <span>二の糸</span>
          <small id="niFrequency"></small>
        </button>

        <button type="button" data-note="san">
          <span>三の糸</span>
          <small id="sanFrequency"></small>
        </button>
      </div>

      <button type="button" class="secondary-button" id="playAllButton">
        一・二・三を連続再生
      </button>

      <p class="status" id="audioStatus" role="status" aria-live="polite">
        糸のボタンを押すと音が鳴ります。
      </p>
    </section>

    <section class="card" aria-labelledby="guide-title">
      <h2 id="guide-title">音の関係</h2>
      <div id="tuningGuide" class="guide-text"></div>
    </section>

    <p class="version">調弦 Ver.1.2</p>
  </main>

  <script src="./app.js" defer></script>
</body>
</html>
